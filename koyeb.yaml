name: career-health-system
services:
  - name: career-health-system
    type: web
    git:
      repository: github.com/Shify0308/career-health-system
      branch: main
    build:
      buildpack:
        build-command: pip install -r requirements.txt
    run:
      command: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    ports:
      - port: 8000
        protocol: http
    routes:
      - path: /
        port: 8000
    env:
      - key: SECRET_KEY
        value: career-health-secret-koyeb-2024
      - key: PYTHON_VERSION
        value: "3.11"
    regions:
      - was
    scaling:
      min: 1
      max: 1
